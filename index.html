<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ramayana: Kingdoms of Dharma</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/x-icon" href="ramayana_favicon.ico" />
</head>
<body>
  <div id="app" class="game-shell">
    <header class="topbar">
      <h1>Ramayana: Kingdoms of Dharma</h1>
      <div class="topbar-actions">
        <button id="saveBtn">Save</button>
        <button id="loadBtn">Load</button>
        <button id="timelineBtn">Timeline</button>
      </div>
    </header>

    <aside class="hud" id="hud"></aside>

    <main class="scene-stage">
      <div class="scene-image-wrap">
        <img id="bgImage" alt="Scene background" />
        <img id="charImage" alt="Character portrait" />
        <div class="image-overlay"></div>
      </div>
      <article id="sceneCard" class="scene-card">
        <h2 id="sceneTitle"></h2>
        <p id="sceneText"></p>
        <div id="choices" class="choice-grid"></div>
      </article>
    </main>

    <section id="timelinePanel" class="timeline hidden">
      <h3>Journey Timeline</h3>
      <ol id="timelineList"></ol>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
